name: "Godot 4.6 Android Export"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  export-android:
    runs-on: ubuntu-latest
    steps:
      # 1. Lấy mã nguồn dự án
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Cài đặt Java JDK 17
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cài đặt Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Cài đặt các công cụ Android Build-Tools cần thiết
      - name: Install Android Build Tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 5. Tải Godot Engine & Templates bằng Action chuyên dụng (Tránh tuyệt đối lỗi gãy URL)
      - name: Install Godot Engine and Templates
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_version: "4.6"
          godot_status: "stable"
          download_templates: true
          # Bước này chỉ dùng để cài đặt môi trường Godot chuẩn vào hệ thống
          export_as_debug: false
          godot_executable_download_url: "https://tuxfamily.org"
          godot_export_templates_download_url: "https://tuxfamily.org"

      # 6. Tạo thư mục chứa file xuất bản
      - name: Create Build Directory
        run: mkdir -p build/android

      # 7. Thực hiện xuất file APK bằng lệnh CLI độc lập
      - name: Export APK via Godot CLI
        run: |
          /root/.local/share/godot/godot --headless --verbose --export-release "Android" build/android/game-release.apk

      # 8. Đẩy file APK lên GitHub Artifacts để bạn tải về
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot-Android-APK
          path: build/android/game-release.apk
