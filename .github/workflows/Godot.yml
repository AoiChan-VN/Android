name: "Godot Android Build"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Export APK
    runs-on: ubuntu-latest
    
    # Sử dụng môi trường Docker chứa sẵn Godot 4.6 và các SDK Android cần thiết
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Godot Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          cp /root/.local/share/godot/export_templates/4.6.stable/* ~/.local/share/godot/export_templates/4.6.stable/
          
      - name: Create Builds Directory
        run: mkdir -v -p builds

      - name: Build Android APK (Debug/Unsigned)
        run: godot --headless --export-debug "Android" builds/game.apk

      - name: Upload APK Artifact
        uses: actions/artifacts@v4
        with:
          name: Godot-Android-APK
          path: builds/game.apk
          if-no-files-found: error
