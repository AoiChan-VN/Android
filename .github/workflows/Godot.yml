name: "Godot 4.6 Android Export"

on:
  push:
    branches: [ "main", "master" ] # Chạy khi push vào nhánh chính
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Cho phép bấm chạy thủ công trên GitHub UI

env:
  GODOT_VERSION: "4.6"
  GODOT_STATUS: "stable" # Bản phát hành chính thức (stable)
  EXPORT_NAME: "Android" # Phải trùng khớp với tên Preset đặt trong Godot

jobs:
  export-android:
    runs-on: ubuntu-latest
    steps:
      # 1. Lấy mã nguồn từ kho lưu trữ
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Thiết lập môi trường Java (Bắt buộc để build Android)
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Thiết lập Android SDK cần thiết
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Tải và cài đặt các thành phần SDK cần thiết cho Godot
      - name: Install Android SDK Platform-Tools & Build-Tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 5. Tải xuống Godot Engine Headless Linux & Export Templates
      - name: Download Godot Engine and Templates
        run: |
          # Tạo sẵn thư mục chứa template cho bản 4.6.stable
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          
          # Tải trực tiếp Godot Editor bằng link cố định
          wget https://tuxfamily.org
          unzip Godot_v4.6-stable_linux.x86_64.zip
          mv Godot_v4.6-stable_linux.x86_64 godot
          chmod +x godot
          
          # Tải trực tiếp Export Templates bằng link cố định
          wget https://tuxfamily.org
          unzip Godot_v4.6-stable_export_templates.tpz -d /tmp/templates
          
          # Di chuyển templates vào thư mục đích
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.6.stable/
          rm -rf /tmp/templates Godot_v4.6-stable_export_templates.tpz Godot_v4.6-stable_linux.x86_64.zip

      # 6. Tạo thư mục chứa sản phẩm đầu ra
      - name: Create Build Directory
        run: mkdir -v -p build/android

      # 7. Chạy Godot CLI để xuất file APK Release (Headless Mode)
      - name: Export APK via Godot CLI
        run: |
          ./godot --headless --verbose --export-release "${{ env.EXPORT_NAME }}" build/android/game-release.apk

      # 8. Đẩy tệp APK lên GitHub Artifacts để tải về
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot-Android-APK
          path: build/android/game-release.apk
